  <g transform="translate(72 72)">
    <rect width="340" height="844" rx="28" fill="#FFFFFF"/>
    <text x="28" y="44" class="font" font-size="12" font-weight="800" fill="#3D5AFE">STUDENT DASHBOARD COPY</text>
    <text x="28" y="92" class="font" font-size="34" font-weight="800" fill="#0E1538">Improved</text>
    <text x="28" y="130" class="font" font-size="34" font-weight="800" fill="#0E1538">Study Hub</text>
    <text x="28" y="166" class="font" font-size="15" font-weight="600" fill="#5C6582">A cleaner mobile-first dashboard that keeps</text>
    <text x="28" y="190" class="font" font-size="15" font-weight="600" fill="#5C6582">the current production data model while</text>
    <text x="28" y="214" class="font" font-size="15" font-weight="600" fill="#5C6582">improving scanability and action priority.</text>

    <g transform="translate(28 258)">
      <circle cx="17" cy="17" r="17" fill="#3D5AFE"/>
      <text x="17" y="22" text-anchor="middle" class="font" font-size="13" font-weight="800" fill="#FFFFFF">1</text>
      <text x="48" y="7" class="font label">Lead with next study action,</text>
      <text x="48" y="27" class="font label">not generic stats.</text>
    </g>
    <g transform="translate(28 354)">
      <circle cx="17" cy="17" r="17" fill="#F08A2C"/>
      <text x="17" y="22" text-anchor="middle" class="font" font-size="13" font-weight="800" fill="#FFFFFF">2</text>
      <text x="48" y="7" class="font label">Keep streak and readiness</text>
      <text x="48" y="27" class="font label">adjacent for daily momentum.</text>
    </g>
    <g transform="translate(28 450)">
      <circle cx="17" cy="17" r="17" fill="#8B5CF6"/>
      <text x="17" y="22" text-anchor="middle" class="font" font-size="13" font-weight="800" fill="#FFFFFF">3</text>
      <text x="48" y="7" class="font label">Use compact quick actions</text>
      <text x="48" y="27" class="font label">with meaningful counts.</text>
    </g>
    <g transform="translate(28 546)">
      <circle cx="17" cy="17" r="17" fill="#16A974"/>
      <text x="17" y="22" text-anchor="middle" class="font" font-size="13" font-weight="800" fill="#FFFFFF">4</text>
      <text x="48" y="7" class="font label">Make question of the day</text>
      <text x="48" y="27" class="font label">feel tappable and review-ready.</text>
    </g>
