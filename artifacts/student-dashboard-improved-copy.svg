        <rect x="138" y="18" width="38" height="12" rx="4" fill="#E66B1F"/>
        <rect x="184" y="18" width="38" height="12" rx="4" fill="#F7AD59"/>
        <rect x="230" y="18" width="38" height="12" rx="4" fill="#F08A2C"/>
