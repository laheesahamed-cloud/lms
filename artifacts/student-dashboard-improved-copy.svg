      <text x="136" y="230" text-anchor="middle" class="font" font-size="14" font-weight="900" fill="#FFFFFF">Resume practice</text>
      <rect x="260" y="196" width="56" height="56" rx="18" fill="#FFFFFF" stroke="#E5E7F0"/>
      <text x="288" y="230" text-anchor="middle" class="font" font-size="15" font-weight="900" fill="#3D5AFE">R</text>
    </g>

