<svg width="1180" height="1220" viewBox="0 0 1180 1220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1180" height="1220" fill="#EFF1FB"/>
  <style>
    .font { font-family: Inter, Arial, sans-serif; }
    .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0; fill: #A8AECB; }
    .title { font-size: 26px; font-weight: 800; fill: #0E1538; }
    .label { font-size: 13px; font-weight: 800; fill: #0E1538; }
    .muted { font-size: 12px; font-weight: 700; fill: #5C6582; }
    .small { font-size: 10px; font-weight: 800; fill: #A8AECB; }
