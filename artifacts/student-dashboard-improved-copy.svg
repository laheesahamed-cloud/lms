      <rect x="28" y="83" width="20" height="20" rx="8" fill="#16A974"/>
      <text x="38" y="98" text-anchor="middle" class="font" font-size="10" font-weight="900" fill="#FFFFFF">B</text>
      <text x="58" y="98" class="font" font-size="12" font-weight="700" fill="#0E1538">Irreducible painful lump</text>
