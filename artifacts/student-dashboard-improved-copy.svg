    <text x="24" y="78" class="font" font-size="24" font-weight="800" fill="#0E1538">Study Hub palette</text>
    <g class="font" font-size="13" font-weight="800" fill="#0E1538">
      <rect x="24" y="106" width="34" height="34" rx="10" fill="#EFF1FB" stroke="#EEF0F6"/><text x="72" y="128">Background</text>
      <rect x="24" y="154" width="34" height="34" rx="10" fill="#FFFFFF" stroke="#EEF0F6"/><text x="72" y="176">Surface</text>
      <rect x="24" y="202" width="34" height="34" rx="10" fill="#0E1538"/><text x="72" y="224">Ink</text>
      <rect x="24" y="250" width="34" height="34" rx="10" fill="#3D5AFE"/><text x="72" y="272">Primary</text>
      <rect x="24" y="298" width="34" height="34" rx="10" fill="#8B5CF6"/><text x="72" y="320">Violet</text>
      <rect x="24" y="346" width="34" height="34" rx="10" fill="#F08A2C"/><text x="72" y="368">Streak</text>
      <rect x="24" y="394" width="34" height="34" rx="10" fill="#16A974"/><text x="72" y="416">Success</text>
    </g>
    <text x="24" y="468" class="font muted">Primitive-based and importable because</text>
    <text x="24" y="488" class="font muted">the repo has no Code Connect mappings yet.</text>
  </g>

