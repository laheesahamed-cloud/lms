      <circle cx="295" cy="39" r="107" fill="#E5E9FF"/>
      <circle cx="320" cy="44" r="66" fill="#F0E7FF"/>
      <text x="24" y="36" class="font" font-size="11" font-weight="800" fill="#3D5AFE">CONTINUE WHERE YOU LEFT OFF</text>
      <text x="24" y="86" class="font" font-size="36" font-weight="900" fill="#0E1538">Hi, Laheez</text>
      <text x="24" y="125" class="font" font-size="14" font-weight="700" fill="#5C6582">Next study move: Practice</text>
