<svg xmlns="http://www.w3.org/2000/svg" width="2540" height="1420" viewBox="0 0 2540 1420">
  <defs>
    <linearGradient id="studyGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d5afe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="studySoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e5e9ff"/>
      <stop offset="1" stop-color="#f0e7ff"/>
    </linearGradient>
    <linearGradient id="streakSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6e9"/>
      <stop offset="1" stop-color="#ffe4c2"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f1430" flood-opacity=".12"/>
    </filter>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f1430" flood-opacity=".08"/>
    </filter>
    <pattern id="quietDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.25" fill="#c8cfe6" opacity=".46"/>
    </pattern>
    <symbol id="menuIcon" viewBox="0 0 24 24">
      <path d="M5 7h14M5 12h14M5 17h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="playIcon" viewBox="0 0 24 24">
      <path d="M8 5.5v13l10-6.5-10-6.5Z" fill="currentColor"/>
    </symbol>
    <symbol id="bookIcon" viewBox="0 0 24 24">
      <path d="M5.5 4.5h6A2.5 2.5 0 0 1 14 7v12H7.5a2 2 0 0 1-2-2V4.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M14 7a2.5 2.5 0 0 1 2.5-2.5H19V19h-5M8 10h3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="capIcon" viewBox="0 0 24 24">
      <path d="m3.5 9 8.5-4 8.5 4-8.5 4-8.5-4Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
      <path d="M7.5 11v4.2c0 1.6 2 2.8 4.5 2.8s4.5-1.2 4.5-2.8V11M19.5 10v5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
    </symbol>
    <symbol id="flameIcon" viewBox="0 0 24 24">
      <path d="M12 3s5 4.2 5 9.4a5 5 0 0 1-10 0c0-2.1 1.1-3.3 1.1-3.3s0 2.1 1.6 2.1C11.4 11.2 9 8.2 12 3Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
    </symbol>
    <symbol id="docIcon" viewBox="0 0 24 24">
      <path d="M6.5 3.5h7.2l3.8 3.8v13.2h-11a2 2 0 0 1-2-2v-13a2 2 0 0 1 2-2Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M13.5 3.5v4h4M8.5 12h7M8.5 16h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
    <symbol id="stethoIcon" viewBox="0 0 24 24">
      <path d="M6 4v5a4 4 0 0 0 8 0V4M4.8 4h2.4M12.8 4h2.4M10 13v1.6a4.5 4.5 0 0 0 9 0V13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="19" cy="11.7" r="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
    </symbol>
    <style>
      text { font-family: "Plus Jakarta Sans", Inter, Arial, sans-serif; letter-spacing: 0; }
      .label { fill: #0e1538; font-size: 30px; font-weight: 950; }
      .screen { fill: #eff1fb; stroke: #dfe4f1; stroke-width: 1.5; }
      .surface { fill: #ffffff; stroke: #e5e7f0; stroke-width: 1.25; filter: url(#cardShadow); }
      .surfaceLite { fill: #ffffff; stroke: #e5e7f0; stroke-width: 1.25; }
      .soft { fill: #f5f6fc; stroke: #eef0f6; stroke-width: 1.2; }
      .ink { fill: #0e1538; }
      .muted { fill: #5c6582; }
      .faint { fill: #a8aecb; }
      .primary { fill: #3d5afe; }
      .violet { fill: #8b5cf6; }
      .amber { fill: #f08a2c; }
      .white { fill: #ffffff; }
      .eyebrow { fill: #a8aecb; font-size: 13px; font-weight: 900; text-transform: uppercase; }
      .h1 { fill: #0e1538; font-size: 42px; font-weight: 950; }
      .h2 { fill: #0e1538; font-size: 25px; font-weight: 950; }
      .h3 { fill: #0e1538; font-size: 18px; font-weight: 920; }
      .body { fill: #5c6582; font-size: 15px; font-weight: 700; }
      .small { fill: #5c6582; font-size: 12px; font-weight: 760; }
      .tiny { fill: #a8aecb; font-size: 10.5px; font-weight: 900; text-transform: uppercase; }
      .iconPrimary { color: #3d5afe; }
      .iconViolet { color: #8b5cf6; }
      .iconAmber { color: #f08a2c; }
      .iconWhite { color: #ffffff; }
    </style>
  </defs>

  <rect width="2540" height="1420" fill="#dfe4f5"/>
  <rect width="2540" height="1420" fill="url(#quietDots)" opacity=".42"/>

