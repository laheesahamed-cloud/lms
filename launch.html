<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ERPM LMS Launch</title>
    <meta name="theme-color" content="#F8FBFF" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 24%),
          radial-gradient(circle at right 18%, rgba(20, 184, 166, 0.08), transparent 18%),
          linear-gradient(145deg, #fbfdff 0%, #f4f9ff 46%, #edf5fb 100%);
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: calc(env(safe-area-inset-top, 0px) + 24px) 24px calc(env(safe-area-inset-bottom, 0px) + 24px);
        box-sizing: border-box;
        color: #16324a;
      }

      .launch-card {
        width: min(100%, 520px);
        display: grid;
        gap: 20px;
        justify-items: center;
        padding: 32px 24px;
        border-radius: 32px;
        border: 1px solid rgba(205, 221, 235, 0.72);
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 24px 60px rgba(17, 73, 118, 0.1);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .launch-badge {
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.08);
        color: #1d4ed8;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .launch-loader {
        position: relative;
        width: 124px;
        height: 124px;
        display: grid;
        place-items: center;
      }

      .launch-loader span {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .launch-loader span:nth-child(1) {
        border: 2px solid rgba(37, 99, 235, 0.16);
        border-top-color: #2563eb;
        animation: launch-spin 2.8s linear infinite;
      }

      .launch-loader span:nth-child(2) {
        inset: 16px;
        border: 2px dashed rgba(20, 184, 166, 0.42);
        animation: launch-spin-reverse 3.6s linear infinite;
      }

      .launch-loader span:nth-child(3) {
        inset: 36px;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.24), rgba(37, 99, 235, 0.02));
        animation: launch-pulse 2.1s ease-in-out infinite;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.1rem);
        line-height: 1.04;
      }

      p {
        margin: 0;
        color: #5d7487;
        font-size: 1rem;
        line-height: 1.7;
      }

      .launch-quote {
        width: 100%;
        padding: 20px;
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(239, 246, 255, 0.9));
        border: 1px solid rgba(205, 221, 235, 0.65);
        box-sizing: border-box;
      }

      blockquote {
        margin: 0;
        color: #16324a;
        font-size: 1.02rem;
        font-weight: 600;
        line-height: 1.7;
      }

      footer {
        margin-top: 12px;
        color: #1d4ed8;
        font-size: 0.84rem;
        font-weight: 800;
      }

      .launch-status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #5d7487;
        font-size: 0.92rem;
      }

      .launch-help {
        max-width: 34ch;
        color: #7a8da0;
        font-size: 0.72rem;
        line-height: 1.55;
      }

      .launch-status::before {
        content: '';
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: linear-gradient(135deg, #14b8a6, #2563eb);
        box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.08);
        animation: launch-blink 1.8s ease-in-out infinite;
      }

      @keyframes launch-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes launch-spin-reverse {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }

      @keyframes launch-pulse {
        0%, 100% { transform: scale(0.88); opacity: 0.55; }
        50% { transform: scale(1.08); opacity: 1; }
      }

      @keyframes launch-blink {
        0%, 100% { opacity: 0.55; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      @media (max-width: 640px) {
        body {
          padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 16px);
        }

        .launch-card {
          gap: 16px;
          padding: 22px 16px;
          border-radius: 24px;
        }

        .launch-badge {
          padding: 7px 12px;
          font-size: 0.72rem;
        }

        .launch-loader {
          width: 102px;
          height: 102px;
        }

        .launch-loader span:nth-child(2) {
          inset: 14px;
        }

        .launch-loader span:nth-child(3) {
          inset: 30px;
        }

        h1 {
          font-size: clamp(1.7rem, 9vw, 2.35rem);
          line-height: 1.08;
        }

        p {
          font-size: 0.94rem;
          line-height: 1.6;
        }

        .launch-quote {
          padding: 16px;
          border-radius: 20px;
        }

        blockquote {
          font-size: 0.94rem;
          line-height: 1.6;
        }

        footer {
          font-size: 0.78rem;
        }

        .launch-status {
          font-size: 0.84rem;
          gap: 8px;
        }

        .launch-help {
          max-width: 30ch;
          font-size: 0.68rem;
          line-height: 1.5;
        }
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        window.location.replace('/lms/?source=pwa-v3');
      }());
    </script>
  </body>
</html>
