<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#EFF1FB">
  <title>Caduceus — Medical study app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      background: #EFF1FB;
      color: #0E1538;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      opacity: 0.4; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.08  0 0 0 0 0.22  0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }
    @keyframes vibeShimmer {
      0%, 100% { filter: brightness(1) saturate(1.05); }
      50%      { filter: brightness(1.08) saturate(1.15); }
    }
    @keyframes vibePulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.4); opacity: 0.35; }
    }
    @keyframes vibeSparkle {
      0%, 100% { transform: scale(0.85) rotate(0deg);   opacity: 0.4; }
      50%      { transform: scale(1.2)  rotate(180deg); opacity: 1;   }
    }

    /* ───────────── APP SHELL LAYOUT ──────────────────────── */
    #root { min-height: 100dvh; }
    .app-shell {
      min-height: 100dvh;
      display: flex;
      position: relative;
      z-index: 2;
    }

    /* Mobile — single column, bottom nav fixed */
    .app-shell.mobile {
      flex-direction: column;
    }
    .app-main {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    .app-content {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 120px;  /* clearance for bottom nav */
      min-height: 100dvh;
    }

    /* Bottom nav — fixed at bottom of viewport on mobile */
    .bottom-nav-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0 12px 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0));
      background: linear-gradient(to top, rgba(239,241,251,0.98) 60%, rgba(239,241,251,0));
      pointer-events: none;
      z-index: 50;
    }
    .bottom-nav-wrap > .bottom-nav { pointer-events: auto; max-width: 460px; margin: 0 auto; }

    /* Desktop — sidebar + content */
    @media (min-width: 900px) {
      .app-shell.desktop { padding-left: 280px; }
      .app-content {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 8px 60px;
      }
    }
    @media (min-width: 1280px) {
      .app-shell.desktop { padding-left: 300px; padding-right: 32px; }
      .app-content { max-width: 800px; }
    }

    /* ───────────── SIDEBAR ───────────────────────────────── */
    .app-sidebar {
      display: none;
    }
    @media (min-width: 900px) {
      .app-sidebar {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 16px; left: 16px; bottom: 16px;
        width: 248px;
        padding: 22px 18px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(14,21,56,0.06);
        border-radius: 24px;
        box-shadow: 0 20px 40px -20px rgba(14,21,56,0.12);
        z-index: 40;
      }
    }
    @media (min-width: 1280px) {
      .app-sidebar { width: 268px; left: 24px; top: 24px; bottom: 24px; }
    }

    .sb-brand { display: flex; align-items: center; gap: 12px; padding: 4px 4px 24px; }
    .sb-brand-mark {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #3D5AFE 0%, #8B5CF6 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px -6px rgba(61,90,254,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .sb-brand-name {
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
      font-size: 19px; color: #0E1538; letter-spacing: -0.6px; line-height: 1;
      font-variation-settings: 'opsz' 24;
    }
    .sb-brand-sub { font-size: 11px; color: #5C6582; font-weight: 600; margin-top: 2px; letter-spacing: 0.2px; }

    .sb-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sb-item {
      position: relative;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 14px; border: none; cursor: pointer;
      background: transparent; color: #5C6582;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
      text-align: left; letter-spacing: -0.1px;
      transition: all 0.15s;
    }
    .sb-item:hover { background: rgba(14,21,56,0.04); color: #0E1538; }
    .sb-item.active {
      background: linear-gradient(135deg, rgba(61,90,254,0.1), rgba(139,92,246,0.1));
      color: #0E1538; font-weight: 800;
    }
    .sb-item.active::before {
      content: '';
      position: absolute; left: -18px; top: 50%; transform: translateY(-50%);
      width: 3px; height: 22px; border-radius: 2px;
      background: linear-gradient(180deg, #3D5AFE, #8B5CF6);
    }
    .sb-item .sb-pill { display: none; }

    .sb-footer { display: flex; flex-direction: column; gap: 14px; padding-top: 16px; border-top: 1px solid rgba(14,21,56,0.06); }
    .sb-link {
      font-size: 12px; font-weight: 700; color: #3D5AFE;
      text-decoration: none; letter-spacing: 0.1px;
      padding: 8px 4px; border-radius: 10px;
    }
    .sb-link:hover { color: #2336CC; }
    .sb-user { display: flex; align-items: center; gap: 10px; padding: 8px 4px; }
    .sb-avatar {
      width: 36px; height: 36px; border-radius: 12px;
      background: linear-gradient(135deg, #3D5AFE 0%, #8B5CF6 100%);
      color: #fff; font-weight: 800; font-size: 12px; letter-spacing: 0.3px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-user-name { font-size: 13px; font-weight: 800; color: #0E1538; }
    .sb-user-sub { font-size: 11px; color: #5C6582; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ───────────── DESKTOP-ONLY MOBILE-FRAMING ───────────── */
    /* On wide screens, the content area is given an outer card-feel */
    @media (min-width: 900px) {
      .app-content::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: -1;
        background:
          radial-gradient(40% 60% at 18% 30%, #DCE0F4 0%, transparent 60%),
          radial-gradient(40% 60% at 95% 80%, #E7DEFA 0%, transparent 60%);
      }
    }

    /* ───────────── DESKTOP HOME BENTO HELPERS ───────────── */
    /* On desktop, the home screen's compact streak + exam stack into a 2-col bento. */
    @media (min-width: 900px) {
      .home-bento {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .home-bento > * { padding: 0 !important; }
    }

    /* ───────────── TAB CONTROL HIDE/SHOW ─────────────────── */
    @media (min-width: 900px) {
      .mobile-only { display: none !important; }
    }
    @media (max-width: 899px) {
      .desktop-only { display: none !important; }
    }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shell + screens -->
  <script type="text/babel" src="app-shell.jsx"></script>
  <script type="text/babel" src="screens-1.jsx"></script>
  <script type="text/babel" src="screens-2.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── TWEAKABLE DEFAULTS ────────────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "blue",
      "ink": "navy",
      "surface": "lavender"
    }/*EDITMODE-END*/;

    const ACCENT_PALETTES = {
      blue:    { accent: '#3D5AFE', accentSoft: '#E5E9FF', primary: '#3D5AFE', primarySoft: '#E5E9FF', primaryInk: '#2336CC', accent2: '#8B5CF6', accent2Soft: '#F0E7FF', grad: 'linear-gradient(135deg, #3D5AFE 0%, #8B5CF6 100%)', gradSoft: 'linear-gradient(135deg, #E5E9FF 0%, #F0E7FF 100%)' },
      emerald: { accent: '#0F9A6B', accentSoft: '#D7F0E5', primary: '#0F9A6B', primarySoft: '#D7F0E5', primaryInk: '#0B7251', accent2: '#0EA5E9', accent2Soft: '#D7F0FA', grad: 'linear-gradient(135deg, #0F9A6B 0%, #0EA5E9 100%)', gradSoft: 'linear-gradient(135deg, #D7F0E5 0%, #D7F0FA 100%)' },
      sunset:  { accent: '#FF6B3D', accentSoft: '#FFE0D2', primary: '#FF6B3D', primarySoft: '#FFE0D2', primaryInk: '#D14418', accent2: '#E04E6A', accent2Soft: '#FCE0E5', grad: 'linear-gradient(135deg, #FF6B3D 0%, #E04E6A 100%)', gradSoft: 'linear-gradient(135deg, #FFE0D2 0%, #FCE0E5 100%)' },
    };
    const INK_PALETTES = {
      navy:    { ink: '#0E1538', inkDeep: '#070A20' },
      teal:    { ink: '#15252E', inkDeep: '#0B1A22' },
      graphite:{ ink: '#1C1F2E', inkDeep: '#0E1018' },
    };
    const SURFACE_PALETTES = {
      lavender:{ bg: '#EFF1FB', surface: '#FFFFFF', surface2: '#F4F5FB', border: '#E5E7F0', borderSoft: '#EEF0F6' },
      mist:    { bg: '#EEF2F6', surface: '#FFFFFF', surface2: '#F4F7FA', border: '#DDE3EA', borderSoft: '#E8ECF1' },
      bone:    { bg: '#F4F1EA', surface: '#FFFFFF', surface2: '#FAF6EC', border: '#E8E4D8', borderSoft: '#F0EBDF' },
    };

    function applyTokens(t) {
      Object.assign(window.TOKENS,
        ACCENT_PALETTES[t.accent] || ACCENT_PALETTES.blue,
        INK_PALETTES[t.ink] || INK_PALETTES.navy,
        SURFACE_PALETTES[t.surface] || SURFACE_PALETTES.lavender,
      );
      const s = SURFACE_PALETTES[t.surface] || SURFACE_PALETTES.lavender;
      document.body.style.background = s.bg;
    }

    // ─── APP ROOT ───────────────────────────────────────────
    function App() {
      const [t, setTweak] = window.useTweaks
        ? window.useTweaks(TWEAK_DEFAULTS)
        : [TWEAK_DEFAULTS, () => {}];

      const isDesktop = window.useMediaQuery('(min-width: 900px)');

      const [tab, setTab] = useState('home');
      const [stack, setStack] = useState([]);
      const [scrollKey, setScrollKey] = useState(0);

      useEffect(() => { applyTokens(t); setScrollKey(k => k + 1); }, [t.accent, t.ink, t.surface]);

      const goTab = (id) => {
        setTab(id); setStack([]); setScrollKey(k => k + 1);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
      const openLesson = (course) => {
        setStack([{ kind: 'lessonDetail', course }]); setScrollKey(k => k + 1);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
      const back = () => {
        setStack([]); setScrollKey(k => k + 1);
        window.scrollTo({ top: 0, behavior: 'instant' });
      };

      // Current view — header menu hidden on desktop (sidebar handles nav)
      let view;
      const hdrProps = isDesktop ? { hideMenu: true } : {};
      if (stack[0]?.kind === 'lessonDetail') {
        view = <window.LessonDetailScreen onBack={back} course={stack[0].course} headerProps={hdrProps} />;
      } else if (tab === 'home')    view = <window.HomeScreen onNav={goTab} isDesktop={isDesktop} />;
      else if (tab === 'qbank')     view = <window.QBankScreen />;
      else if (tab === 'courses')   view = <window.CoursesScreen />;
      else if (tab === 'lessons')   view = <window.LessonsScreen onOpenLesson={openLesson} />;
      else if (tab === 'results')   view = <window.ResultsScreen />;

      const labelMap = { home: 'Study Hub', qbank: 'Q-Bank', courses: 'All Courses', lessons: 'Lessons', results: 'Results' };
      const screenLabel = stack[0]?.kind === 'lessonDetail' ? `${stack[0].course?.name || 'Lesson'} · Unit 1` : labelMap[tab];
      const idxMap = { home: 3, qbank: 2, courses: 1, lessons: 4, results: 5 };
      const screenIdx = stack[0]?.kind === 'lessonDetail' ? '4·1' : idxMap[tab];
      const activeTab = stack[0]?.kind === 'lessonDetail' ? 'lessons' : tab;

      return (
        <div className={`app-shell ${isDesktop ? 'desktop' : 'mobile'}`}
             data-screen-label={`${screenIdx} ${screenLabel}`}>
          {isDesktop && <window.Sidebar active={activeTab} onChange={goTab} />}
          <main className="app-main">
            <div className="app-content" key={scrollKey}>
              {view}
            </div>
            {!isDesktop && <window.BottomNav active={activeTab} onChange={goTab} />}
          </main>

          {window.TweaksPanel && (
            <window.TweaksPanel title="Tweaks">
              <window.TweakSection label="Color">
                <window.TweakRadio
                  label="Accent palette"
                  value={t.accent}
                  options={[
                    { value: 'blue',    label: 'Blue/Purple' },
                    { value: 'emerald', label: 'Emerald' },
                    { value: 'sunset',  label: 'Sunset' },
                  ]}
                  onChange={(v) => setTweak('accent', v)}
                />
                <window.TweakRadio
                  label="Ink (dark surface)"
                  value={t.ink}
                  options={[
                    { value: 'navy',     label: 'Navy' },
                    { value: 'teal',     label: 'Teal' },
                    { value: 'graphite', label: 'Graphite' },
                  ]}
                  onChange={(v) => setTweak('ink', v)}
                />
                <window.TweakRadio
                  label="Surface tone"
                  value={t.surface}
                  options={[
                    { value: 'lavender', label: 'Lavender' },
                    { value: 'mist',     label: 'Mist' },
                    { value: 'bone',     label: 'Bone' },
                  ]}
                  onChange={(v) => setTweak('surface', v)}
                />
              </window.TweakSection>
            </window.TweaksPanel>
          )}
        </div>
      );
    }

    applyTokens(TWEAK_DEFAULTS);
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
