<!doctype html>
<html lang="en" data-theme="light" data-accent-theme="codeforge">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>xyndrome | Medical Study Platform</title>
    <meta name="description" content="xyndrome helps medical students study with structured lessons, Q-Bank practice, exams, revision notes, bookmarks, subscriptions, and progress analytics." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://xyndrome.lk/lms/" />
    <meta property="og:title" content="xyndrome | Medical Study Platform" />
    <meta property="og:description" content="Structured medical lessons, Q-Bank practice, exams, revision notes, subscriptions, and progress analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xyndrome.lk/lms/" />
    <meta property="og:image" content="https://xyndrome.lk/lms/pwa-icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="xyndrome | Medical Study Platform" />
    <meta name="twitter:description" content="Structured medical lessons, Q-Bank practice, exams, revision notes, subscriptions, and progress analytics." />
    <meta name="twitter:image" content="https://xyndrome.lk/lms/pwa-icon-512.png" />
    <meta name="theme-color" content="#05070d" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="xyndrome" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/lms/manifest.webmanifest" vite-ignore />
    <link rel="shortcut icon" type="image/png" href="/lms/favicon-light-32.png" vite-ignore />
    <link rel="icon" type="image/png" sizes="32x32" href="/lms/favicon-light-32.png" vite-ignore />
    <link rel="icon" type="image/png" sizes="192x192" href="/lms/favicon-light-192.png" vite-ignore />
    <link rel="apple-touch-icon" sizes="180x180" href="/lms/favicon-light-180.png" vite-ignore />
    <script src="%BASE_URL%boot.js" vite-ignore></script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        width: 100%;
        background: #05070d;
      }
      html[data-lms-runtime="native"],
      html[data-lms-runtime="native"] body,
      html[data-lms-runtime="native"] #root {
        background: #dce6f4;
      }
      html[data-lms-runtime="native"][data-theme="dark"],
      html[data-lms-runtime="native"][data-theme="dark"] body,
      html[data-lms-runtime="native"][data-theme="dark"] #root {
        background: #02030a;
      }
      /* Boot splash (M7): contentful first paint on app surfaces before any
         JS/CSS arrives. Shown only when the boot script sets
         data-lms-boot-splash; React's first render replaces #root content. */
      #lms-boot-splash {
        display: none;
      }
      html[data-lms-boot-splash="on"] body.app-booting #lms-boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #f3f6fc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      html[data-lms-boot-splash="on"][data-theme="dark"] body.app-booting #lms-boot-splash {
        background: #0a0a0f;
        color: #eef3f8;
      }
      #lms-boot-splash strong {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
        animation: lmsBootSplashPulse 1.4s ease-in-out infinite;
      }
      @keyframes lmsBootSplashPulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #lms-boot-splash strong { animation: none; }
      }
    </style>
  </head>
  <body class="app-booting">
    <div id="root"><div id="lms-boot-splash" aria-hidden="true"><strong>xyndrome</strong></div></div>
    <script type="module">
      import('/src/main.jsx');
    </script>
  </body>
</html>
