<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LMS Mobile Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3f8;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        max-width: 100%;
        overflow: hidden;
        overflow-x: hidden;
        overscroll-behavior: none;
        touch-action: pan-y;
        background: #000;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
        background:
          radial-gradient(circle at top left, rgba(0, 132, 209, 0.12), transparent 34rem),
          linear-gradient(135deg, #f8fbff 0%, #e8eef6 55%, #f5f7f2 100%);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(248, 251, 255, 0.86);
        backdrop-filter: blur(16px);
      }

      .toolbar__title {
        margin-right: 8px;
        color: #475569;
        font-size: 13px;
        font-weight: 800;
      }

      button {
        min-height: 44px;
        border: 1px solid rgba(15, 23, 42, 0.16);
        border-radius: 8px;
        padding: 0 14px;
        background: #ffffff;
        color: #0f172a;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 150ms cubic-bezier(0.23, 1, 0.32, 1), border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      button:active {
        transform: scale(0.97);
      }

      button[aria-pressed="true"] {
        border-color: #0084d1;
        background: #0084d1;
        color: #ffffff;
        box-shadow: 0 8px 18px rgba(0, 132, 209, 0.18);
      }

      .stage {
        min-height: 0;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 12px;
        padding: 28px;
      }

      .phone {
        width: min(var(--phone-width, 390px), calc(100% - 28px));
        height: min(var(--phone-height, 844px), calc(100vh - 110px));
        min-height: 520px;
        overflow: auto;
        overflow-x: hidden;
        overscroll-behavior: none;
        touch-action: pan-y;
        -webkit-overflow-scrolling: touch;
        border: 12px solid #111827;
        border-radius: 42px;
        background: #ffffff;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.24);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
        touch-action: pan-y;
      }

      .hint {
        max-width: 520px;
        margin: 0;
        color: #64748b;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.5;
        text-align: center;
      }

      .hint a {
        color: #006fb8;
        font-weight: 850;
      }

      @media (max-width: 560px) {
        .toolbar {
          overflow-x: auto;
          justify-content: flex-start;
        }

        .stage {
          padding: 14px;
        }

        .phone {
          border-width: 8px;
          border-radius: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar" aria-label="Preview devices">
      <span class="toolbar__title">Browser mobile preview</span>
      <button type="button" data-width="390" data-height="844" aria-pressed="true">iPhone</button>
      <button type="button" data-width="412" data-height="915" aria-pressed="false">Pixel</button>
      <button type="button" data-width="360" data-height="740" aria-pressed="false">Small</button>
      <button type="button" data-width="768" data-height="1024" aria-pressed="false">Tablet</button>
    </div>
    <main class="stage">
      <div class="phone" id="phone">
        <iframe title="LMS app mobile preview" src="frontend/dist/?theme=light"></iframe>
      </div>
      <p class="hint">
        This preview runs in the browser and does not need an iOS emulator. If the app is blank, open it through Apache at
        <a href="/lms/mobile-preview.html">/lms/mobile-preview.html</a> after building the frontend.
      </p>
    </main>
    <script>
      const phone = document.getElementById('phone');
      const buttons = Array.from(document.querySelectorAll('button[data-width]'));

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          buttons.forEach((item) => item.setAttribute('aria-pressed', 'false'));
          button.setAttribute('aria-pressed', 'true');
          phone.style.setProperty('--phone-width', `${button.dataset.width}px`);
          phone.style.setProperty('--phone-height', `${button.dataset.height}px`);
        });
      });
    </script>
  </body>
</html>
